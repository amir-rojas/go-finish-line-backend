openapi: 3.0.3
info:
  title: FinishLine API
  description: Backend for footrace participant registration.
  version: 0.3.0
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: system
    description: Operational and health endpoints
  - name: auth
    description: Authentication — login, token refresh
  - name: users
    description: Admin user management
paths:
  /api/v1/auth/login:
    post:
      operationId: login
      summary: Authenticate and receive tokens
      description: Returns a short-lived access token in the body and sets a long-lived refresh token in an httpOnly cookie.
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated. Access token in body, refresh token in a Set-Cookie header.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Malformed body or missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials (same response whether the email is unknown or the password is wrong)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: invalid credentials
  /api/v1/auth/refresh:
    post:
      operationId: refresh
      summary: Rotate tokens using the refresh cookie
      description: Reads the refresh token from the httpOnly cookie, issues a new access token and a rotated refresh token. Reusing an already-rotated token revokes the whole session family.
      tags:
        - auth
      responses:
        "200":
          description: Rotated. New access token in body, new refresh token in a Set-Cookie header.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Missing, expired, invalid, or reused refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: token reuse detected
  /health:
    get:
      operationId: getHealth
      summary: Liveness and database connectivity check
      tags:
        - system
      responses:
        "200":
          description: Service and database are healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ok
        "503":
          description: Service is up but the database is unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: unavailable
  /api/v1/users:
    post:
      operationId: createUser
      summary: Register a new admin user
      tags:
        - users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Malformed body or validation failure (invalid email, password out of 8-72 range, missing fields)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: password must be at least 8 characters
        "409":
          description: Email is already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: email is already registered
    get:
      operationId: listUsers
      summary: List admin users
      description: Without filters, returns all users ordered by creation date (newest first). With the email filter, returns an array with the matching user or an empty array — no match is not an error.
      tags:
        - users
      security:
        - bearerAuth: []
      parameters:
        - name: email
          in: query
          required: false
          description: Filter by exact email (case-insensitive)
          schema:
            type: string
            format: email
      responses:
        "200":
          description: Matching users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "400":
          description: The email filter is not a valid email address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: email is invalid
  /api/v1/users/{id}:
    get:
      operationId: getUserById
      summary: Get an admin user by ID
      tags:
        - users
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: The id is not a valid UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: invalid user id
        "404":
          description: No user with that ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: user not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: admin@finishline.dev
        password:
          type: string
          format: password
          example: admin.123
    TokenResponse:
      type: object
      required:
        - access_token
        - token_type
        - expires_at
      properties:
        access_token:
          type: string
          description: "Short-lived JWT to send as `Authorization: Bearer <token>`."
        token_type:
          type: string
          example: Bearer
        expires_at:
          type: string
          format: date-time
          example: "2026-06-13T22:16:56Z"
    HealthStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
            - unavailable
          example: ok
    CreateUserRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          example: Ana Pérez
        email:
          type: string
          format: email
          example: ana@example.com
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 72
          example: secure-password
    User:
      type: object
      required:
        - id
        - name
        - email
        - created_at
      properties:
        id:
          type: string
          format: uuid
          example: 27494c6b-6532-4517-a7ea-b9f63279f7a2
        name:
          type: string
          example: Ana Pérez
        email:
          type: string
          format: email
          example: ana@example.com
        created_at:
          type: string
          format: date-time
          example: "2026-06-12T20:23:18.787316Z"
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: email is already registered
